name: Pages Previews (one folder per branch)

on:
  push:
    branches-ignore:
      - gh-pages   # never trigger from the pages branch itself

permissions:
  contents: write  # required to push to gh-pages

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 👉 Adjust this if your HTML lives somewhere else
      - name: Build static preview
        run: |
          mkdir -p out
          cp -R ./* out/ || true

      - name: Compute branch slug
        id: slug
        shell: bash
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SLUG=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[\/_]/-/g; s/[^a-z0-9-]/-/g')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      # Publish to gh-pages under /previews/<branch-slug> without deleting others
      - name: Publish to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: out
          target-folder: previews/${{ steps.slug.outputs.slug }}
          clean: false
